name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  layer1:
    name: Layer 1 — algebraic invariants
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Show node version
        run: node --version
      - name: Run Layer 1 tests
        run: npm test
